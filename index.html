<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>FOTOS INSTANTÁNEAS @clickandpose.ecu</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- LOGO PERSONALIZADO --> 
<link rel="icon" type="image/x-icon" href="favicon.ico" />

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5dc;
  color: #4b2e2e;
  margin: 0;
}

h1 {
  text-align: center;
  margin: 16px 0;
  font-size: 32px;
  color: #000; /* negro */
}

/* ✅ TUS COLORES EXACTOS */
.green{background:#4CAF50}
.blue{background:#2196F3}
.yellow{background:#FFEB3B}
.purple{background:#9C27B0}
.brown{background:#795548}

/* Paleta de colores */
.palette {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-gap: 8px;
  margin-top: 10px;
}

.palette-option {
  width: 30px;
  height: 30px;
  border-radius: 4px;
  cursor: pointer;
  border: 2px solid #4b2e2e;
}

.palette-option.active {
  border: 3px solid #000;
  box-shadow: 0 0 8px rgba(0,0,0,0.6);
}

/* Botón TEMPORADA */
.season-option {
  grid-column: 1 / span 4;
  height: 40px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid #4b2e2e;
  background: #d48c8c;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  color: #000; /* negro */
}

/* Botón UPDATE */
.update-option {
  grid-column: 1 / span 4;
  height: 40px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid #4b2e2e;
  background: #4CAF50;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  color: #000; /* negro */
}

.watermark-option {
  grid-column: 1 / span 4;
  height: 40px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid #4b2e2e;
  background: #ffffff; /* fondo blanco */
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  color: #000; /* letras negras */
}

.watermark-option.active {
  border: 4px solid #000;
  box-shadow: 0 0 12px rgba(0,0,0,0.7);
}

.season-option.active {
  border: 4px solid #000;
  box-shadow: 0 0 12px rgba(0,0,0,0.7);
}

.main-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px;
}

/* Igualar ancho de columnas izquierda y derecha */
#layoutSelector, .controls {
  width: 180px;
}

.frame {
  width: 400px;
  aspect-ratio: 2/3;
  border: 4px solid #4b2e2e;
  border-radius: 12px;
  background: #fff;
  position: relative;
  overflow: hidden;
}

#preview, #resultCanvas {
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
  object-fit: cover;
  transition: opacity 0.5s ease;
}

#preview { transform: scaleX(-1); opacity: 1; }
#resultCanvas { display: none; opacity: 0; }

.flash {
  position:absolute;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.5s ease;
}
.flash.show { opacity:1; }

#layoutSelector {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.layout-option {
  position: relative;
  cursor: pointer;
}

/* Botones de layouts rectangulares como los de control */
.thumb {
  width: 160px;
  height: 50px;
  border: 2px solid #4b2e2e;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  font-weight: bold;
  font-size: 18px;
  color: #000; /* negro */
}

.layout-option.active .thumb {
  border: 6px solid #000;
  box-shadow: 0 0 12px rgba(0,0,0,0.7);
}

.layout-option.active::after {
  content: "✓";
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 24px;
  font-weight: bold;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

button {
  padding: 12px;
  border: 2px solid #4b2e2e;
  background: #f5df9f;
  border-radius: 8px;
  cursor: pointer;
  width: 160px;
  font-family: Arial, sans-serif;
  font-weight: bold;
  color: #000; /* negro */
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#mirrorBox {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #000;
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  z-index: 10000;
}

#mirrorFull {
  position: fixed;
  inset: 0;
  background: #000;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#mirrorFull video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

#mirrorTitle {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #f5f5dc;
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  padding: 8px 16px;
  border: 3px solid #4b2e2e;
  border-radius: 8px;
  background: rgba(0,0,0,0.5);
}

.watermark-option {
  width: 160px;          /* igual que .thumb */
  height: 50px;          /* igual que .thumb */
  border: 2px solid #4b2e2e;
  border-radius: 8px;    /* igual que .thumb */
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  font-weight: bold;
  font-size: 18px;       /* igual que .thumb */
  color: #000;
  background: #ffffff;   /* fondo blanco */
  cursor: pointer;
  margin-top: 10px;      /* opcional, para separarlo un poco */
}

.watermark-option.active {
  border: 4px solid #000;
  box-shadow: 0 0 12px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<h1>FOTOS INSTANTÁNEAS<br>@clickandpose.ecu</h1>

<!-- Cuadro ESPEJO -->
<div id="mirrorBox">ESPEJO</div>
<div id="mirrorFull">
  <video autoplay playsinline></video>
  <div id="mirrorTitle">FOTOS INSTANTÁNEAS<br>@clickandpose.ecu</div>
</div>

<div class="main-container">

  <div id="layoutSelector">
    <div class="layout-option" data-layout="1"><div class="thumb green">1</div></div>
    <div class="layout-option" data-layout="2"><div class="thumb blue">2</div></div>
    <div class="layout-option" data-layout="3"><div class="thumb yellow">3</div></div>
    <div class="layout-option" data-layout="4"><div class="thumb purple">4</div></div>
    <div class="layout-option" data-layout="8"><div class="thumb brown">8</div></div>

    <!-- Botón para subir marca de agua -->
    <div class="watermark-option">MARCA</div>
    <input type="file" id="watermarkInput" accept="image/*" style="display:none">
  </div>

  <div class="frame">
    <video id="preview" autoplay playsinline></video>
    <canvas id="resultCanvas" width="1200" height="1800"></canvas>
    <div class="flash" id="flash"></div>
  </div>

  <div class="controls">
    <button id="startBtn">Tomar foto</button>
    <button id="repeatBtn" disabled>Repetir</button>
    <button id="nextBtn" disabled>Siguiente</button>
    <button id="downloadBtn">Descargar</button>
    <button id="printBtn">Imprimir</button>
    <button id="resetBtn">Reiniciar</button>

    <h3>Escoge tu fondo:</h3>
    <div class="palette">
      <!-- paleta de colores -->
      <div class="palette-option" data-background="red" style="background:#F44336"></div>
      <div class="palette-option" data-background="orange" style="background:#FF9800"></div>
      <div class="palette-option" data-background="yellow" style="background:#FFEB3B"></div>
      <div class="palette-option" data-background="lightgreen" style="background:#8BC34A"></div>
      <div class="palette-option" data-background="green" style="background:#4CAF50"></div>
      <div class="palette-option" data-background="teal" style="background:#009688"></div>
      <div class="palette-option" data-background="cyan" style="background:#00BCD4"></div>
      <div class="palette-option" data-background="blue" style="background:#2196F3"></div>
      <div class="palette-option" data-background="indigo" style="background:#3F51B5"></div>
      <div class="palette-option" data-background="purple" style="background:#9C27B0"></div>
      <div class="palette-option" data-background="deepPurple" style="background:#673AB7"></div>
      <div class="palette-option" data-background="pink" style="background:#E91E63"></div>
      <div class="palette-option" data-background="brown" style="background:#795548"></div>
      <div class="palette-option" data-background="beige" style="background:#ebcaa8"></div>
      <div class="palette-option" data-background="white" style="background:#ffffff"></div>
      <div class="palette-option" data-background="black" style="background:#000000"></div>

      <!-- Botón TEMPORADA único -->
      <div class="season-option" data-background="season">TEMPORADA</div>

      <!-- Botón UPDATE -->
      <div class="update-option">UPDATE</div>
      <input type="file" id="updateInput" accept="image/*" style="display:none">

    </div>
  </div>

  <audio id="shutterSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_5c5b9cbb44.mp3" preload="auto"></audio>

  <!-- Librerías para ZIP y GIF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>
  <script src="app.js"></script>
</div>
